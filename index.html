<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>성경 읽기 체크리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F4EF; --card:#FEFCF8; --accent:#613B8E; --accent-l:#8B5DB5;
  --faint:#EDE5F5; --text:#2C2635; --text2:#7A6F8A; --muted:#B0A8C0;
  --border:#E8E0F0; --border-l:#F0EBF8; --done-col:#C4B8D8; --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);min-height:100vh;padding-bottom:72px}

/* HEADER */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:22px 18px 18px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(97,59,142,.07)}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.back-btn{width:32px;height:32px;border-radius:10px;background:var(--faint);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.back-btn:hover{background:var(--accent)}
.back-btn svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.back-btn:hover svg{stroke:#fff}
.hdr-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-icon svg{width:19px;height:19px}
.htitle{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:600;letter-spacing:-.3px}
.hsub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:300;letter-spacing:.3px}

/* PROGRESS */
.dash{display:flex;align-items:center;gap:14px}
.stat-n{font-size:28px;font-weight:600;color:var(--accent);line-height:1;letter-spacing:-1px}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;font-weight:300}
.pbar-wrap{flex:1}
.pbar-meta{display:flex;justify-content:space-between;margin-bottom:7px;font-size:12px;color:var(--text2)}
.pbar-meta strong{font-weight:600;color:var(--accent)}
.track{height:7px;background:var(--faint);border-radius:99px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-l));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* TABS */
.tabs{padding:14px 16px 0;display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:6px 15px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.tab:hover:not(.on){border-color:var(--accent-l);color:var(--accent)}

/* BOOK GRID */
.section{padding:18px 16px 6px}
.sec-label{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;padding:0 4px;margin-bottom:10px}
.book-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:600px){.book-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.book-grid{grid-template-columns:repeat(4,1fr)}}

.book-card{background:var(--card);border:1.5px solid var(--border-l);border-radius:var(--r);padding:12px 12px 12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .18s;box-shadow:0 2px 12px rgba(97,59,142,.07);position:relative;overflow:hidden;min-height:64px}
.book-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:99px 0 0 99px;opacity:0;transition:opacity .18s}
.book-card:hover{border-color:var(--accent-l);box-shadow:0 4px 20px rgba(97,59,142,.14);transform:translateY(-1px)}
.book-card:hover::before,.book-card.all-done::before{opacity:1}
.book-card.all-done{background:#FAF7FD}

/* ring */
.ring-svg{width:34px;height:34px;transform:rotate(-90deg);flex-shrink:0}
.ring-bg{fill:none;stroke:var(--faint);stroke-width:3}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .4s}

.book-info{flex:1;min-width:0}
.book-num-lbl{font-size:10px;color:var(--muted);margin-bottom:2px}
.book-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .18s}
.book-card.all-done .book-name{color:var(--done-col);text-decoration:line-through;text-decoration-color:var(--done-col)}
.book-ch-sub{font-size:11px;color:var(--muted);margin-top:3px}

.ext-btn{width:26px;height:26px;border-radius:8px;background:var(--faint);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;text-decoration:none}
.ext-btn svg{width:12px;height:12px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ext-btn:hover{background:var(--accent)}
.ext-btn:hover svg{stroke:#fff}

/* CHAPTER VIEW */
#chview{display:none}
.ch-hdr-book{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600}
.ch-hdr-sub{font-size:12px;color:var(--muted);margin-top:2px}
.ch-actions{display:flex;gap:8px;padding:12px 16px 0;flex-wrap:wrap}
.ch-act{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block}
.ch-act:hover{border-color:var(--accent);color:var(--accent)}
.ch-act.danger:hover{border-color:#E05555;color:#E05555}

.ch-grid{padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
@media(min-width:480px){.ch-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}}

.ch-item{display:flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border-l);border-radius:10px;padding:8px 10px;box-shadow:0 1px 6px rgba(97,59,142,.05);transition:border-color .15s}
.ch-item:hover{border-color:var(--accent-l)}
.ch-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);background:white;cursor:pointer;flex-shrink:0;font-size:11px;color:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.ch-check.done{background:var(--accent);border-color:var(--accent);color:white}
.ch-num{flex:1;text-align:center;font-size:14px;font-weight:500;color:var(--accent);text-decoration:none;font-family:'Noto Sans KR',sans-serif}
.ch-num:hover{text-decoration:underline}

/* FOOTER */
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:11px 20px;padding-bottom:max(11px,env(safe-area-inset-bottom));display:flex;justify-content:center;z-index:150}
.reset-btn{background:none;border:1.5px solid var(--border);border-radius:20px;padding:7px 24px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:#E05555;color:#E05555}

.hidden{display:none!important}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-row">
    <button class="back-btn hidden" id="backBtn" onclick="goBack()">
      <svg viewBox="0 0 16 16"><polyline points="10,3 5,8 10,13"/></svg>
    </button>
    <div class="hdr-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
    </div>
    <div id="hdrText">
      <div class="htitle">성경 읽기 체크리스트</div>
      <div class="hsub">66권 · 장별 완독 목표</div>
    </div>
  </div>
  <div class="dash">
    <div>
      <div class="stat-n" id="pctNum">0%</div>
      <div class="stat-l">전체 진도</div>
    </div>
    <div class="pbar-wrap">
      <div class="pbar-meta">
        <span>장 <span id="doneCh">0</span> / <span id="totalCh">0</span></span>
        <strong id="pctLbl">0%</strong>
      </div>
      <div class="track"><div class="fill" id="fillBar"></div></div>
    </div>
  </div>
</header>

<!-- BOOK LIST VIEW -->
<div id="bookView">
  <div class="tabs" id="tabsEl"></div>
  <div id="bookContent"></div>
</div>

<!-- CHAPTER VIEW -->
<div id="chview">
  <div class="ch-actions">
    <button class="ch-act" onclick="checkAll()">전체 완독</button>
    <button class="ch-act danger" onclick="clearBook()">이 권 초기화</button>
    <button class="ch-act" id="wolLink" onclick="openLibCur()">WOL에서 읽기 ↗</button>
  </div>
  <div class="ch-grid" id="chGrid"></div>
</div>

<div class="footer">
  <button class="reset-btn" onclick="resetAll()">전체 초기화</button>
</div>

<script>
const BOOKS = [
  {n:"창세기",      num:"01",t:"히브리어",ch:50},
  {n:"출애굽기",    num:"02",t:"히브리어",ch:40},
  {n:"레위기",      num:"03",t:"히브리어",ch:27},
  {n:"민수기",      num:"04",t:"히브리어",ch:36},
  {n:"신명기",      num:"05",t:"히브리어",ch:34},
  {n:"여호수아",    num:"06",t:"히브리어",ch:24},
  {n:"판사기",      num:"07",t:"히브리어",ch:21},
  {n:"룻기",        num:"08",t:"히브리어",ch:4},
  {n:"사무엘상",    num:"09",t:"히브리어",ch:31},
  {n:"사무엘하",    num:"10",t:"히브리어",ch:24},
  {n:"열왕기상",    num:"11",t:"히브리어",ch:22},
  {n:"열왕기하",    num:"12",t:"히브리어",ch:25},
  {n:"역대상",      num:"13",t:"히브리어",ch:29},
  {n:"역대하",      num:"14",t:"히브리어",ch:36},
  {n:"에스라",      num:"15",t:"히브리어",ch:10},
  {n:"느헤미야",    num:"16",t:"히브리어",ch:13},
  {n:"에스더",      num:"17",t:"히브리어",ch:10},
  {n:"욥기",        num:"18",t:"히브리어",ch:42},
  {n:"시편",        num:"19",t:"히브리어",ch:150},
  {n:"잠언",        num:"20",t:"히브리어",ch:31},
  {n:"전도서",      num:"21",t:"히브리어",ch:12},
  {n:"아가",        num:"22",t:"히브리어",ch:8},
  {n:"이사야",      num:"23",t:"히브리어",ch:66},
  {n:"예레미야",    num:"24",t:"히브리어",ch:52},
  {n:"예레미야 애가",num:"25",t:"히브리어",ch:5},
  {n:"에스겔",      num:"26",t:"히브리어",ch:48},
  {n:"다니엘",      num:"27",t:"히브리어",ch:12},
  {n:"호세아",      num:"28",t:"히브리어",ch:14},
  {n:"요엘",        num:"29",t:"히브리어",ch:3},
  {n:"아모스",      num:"30",t:"히브리어",ch:9},
  {n:"오바댜",      num:"31",t:"히브리어",ch:1},
  {n:"요나",        num:"32",t:"히브리어",ch:4},
  {n:"미가",        num:"33",t:"히브리어",ch:7},
  {n:"나훔",        num:"34",t:"히브리어",ch:3},
  {n:"하박국",      num:"35",t:"히브리어",ch:3},
  {n:"스바냐",      num:"36",t:"히브리어",ch:3},
  {n:"학개",        num:"37",t:"히브리어",ch:2},
  {n:"스가랴",      num:"38",t:"히브리어",ch:14},
  {n:"말라기",      num:"39",t:"히브리어",ch:4},
  {n:"마태복음",    num:"40",t:"그리스어",ch:28},
  {n:"마가복음",    num:"41",t:"그리스어",ch:16},
  {n:"누가복음",    num:"42",t:"그리스어",ch:24},
  {n:"요한복음",    num:"43",t:"그리스어",ch:21},
  {n:"사도행전",    num:"44",t:"그리스어",ch:28},
  {n:"로마서",      num:"45",t:"그리스어",ch:16},
  {n:"고린도전서",  num:"46",t:"그리스어",ch:16},
  {n:"고린도후서",  num:"47",t:"그리스어",ch:13},
  {n:"갈라디아서",  num:"48",t:"그리스어",ch:6},
  {n:"에베소서",    num:"49",t:"그리스어",ch:6},
  {n:"빌립보서",    num:"50",t:"그리스어",ch:4},
  {n:"골로새서",    num:"51",t:"그리스어",ch:4},
  {n:"데살로니가전서",num:"52",t:"그리스어",ch:5},
  {n:"데살로니가후서",num:"53",t:"그리스어",ch:3},
  {n:"디모데전서",  num:"54",t:"그리스어",ch:6},
  {n:"디모데후서",  num:"55",t:"그리스어",ch:4},
  {n:"디도서",      num:"56",t:"그리스어",ch:3},
  {n:"빌레몬서",    num:"57",t:"그리스어",ch:1},
  {n:"히브리서",    num:"58",t:"그리스어",ch:13},
  {n:"야고보서",    num:"59",t:"그리스어",ch:5},
  {n:"베드로전서",  num:"60",t:"그리스어",ch:5},
  {n:"베드로후서",  num:"61",t:"그리스어",ch:3},
  {n:"요한1서",     num:"62",t:"그리스어",ch:5},
  {n:"요한2서",     num:"63",t:"그리스어",ch:1},
  {n:"요한3서",     num:"64",t:"그리스어",ch:1},
  {n:"유다서",      num:"65",t:"그리스어",ch:1},
  {n:"요한계시록",  num:"66",t:"그리스어",ch:22},
];

const TOTAL_CH = BOOKS.reduce((a,b)=>a+b.ch,0);
const LS_KEY = "bible_ch_v2";
const TABS = ["전체","히브리어 성경","그리스어 성경"];
let state = {};
let activeTab = "전체";
let curBook = null;

function loadState(){
  try{ state = JSON.parse(localStorage.getItem(LS_KEY)||"{}"); }catch(e){ state={}; }
  BOOKS.forEach(b=>{
    const prev = Array.isArray(state[b.num]) ? state[b.num] : [];
    if(prev.length !== b.ch){
      state[b.num] = Array.from({length:b.ch},(_,i)=>!!prev[i]);
    }
  });
}
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

function doneCh(num){ return state[num].filter(Boolean).length; }
function totalDone(){ return BOOKS.reduce((a,b)=>a+doneCh(b.num),0); }

function updateProgress(){
  const done = totalDone();
  const pct = Math.round(done/TOTAL_CH*100);
  document.getElementById("doneCh").textContent = done;
  document.getElementById("totalCh").textContent = TOTAL_CH;
  document.getElementById("pctNum").textContent = pct+"%";
  document.getElementById("pctLbl").textContent = pct+"%";
  document.getElementById("fillBar").style.width = pct+"%";
}

function ringHTML(num){
  const b = BOOKS.find(x=>x.num===num);
  const pct = doneCh(num)/b.ch;
  const r=14, circ=2*Math.PI*r;
  return `<svg class="ring-svg" viewBox="0 0 36 36">
    <circle class="ring-bg" cx="18" cy="18" r="${r}"/>
    <circle class="ring-fg" cx="18" cy="18" r="${r}"
      stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${(circ*(1-pct)).toFixed(2)}"/>
  </svg>`;
}

function renderTabs(){
  document.getElementById("tabsEl").innerHTML = TABS.map(t=>
    `<button class="tab${t===activeTab?' on':''}" onclick="switchTab('${t}')">${t}</button>`
  ).join("");
}

function switchTab(t){ activeTab=t; renderTabs(); renderBooks(); }

function renderBooks(){
  const filter = activeTab==="전체"?["히브리어","그리스어"]
    : activeTab==="히브리어 성경"?["히브리어"]:["그리스어"];
  const labelMap = {"히브리어":"히브리어 성경","그리스어":"그리스어 성경"};
  let html="";
  for(const t of filter){
    const books = BOOKS.filter(b=>b.t===t);
    html+=`<div class="section">
      <div class="sec-label">${labelMap[t]} · ${books.length}권</div>
      <div class="book-grid">
        ${books.map(b=>{
          const done=doneCh(b.num), allDone=done===b.ch;
          return `<div class="book-card${allDone?' all-done':''}" onclick="openBook('${b.num}')">
            ${ringHTML(b.num)}
            <div class="book-info">
              <div class="book-num-lbl">${b.num}번째 책</div>
              <div class="book-name">${b.n}</div>
              <div class="book-ch-sub">${done}/${b.ch}장</div>
            </div>
            <button class="ext-btn" onclick="event.stopPropagation();openLib(event,${parseInt(b.num)},1)" title="WOL에서 읽기">
              <svg viewBox="0 0 16 16"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3"/><polyline points="10 3 13 3 13 6"/><line x1="7" y1="9" x2="13" y2="3"/></svg>
            </button>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }
  document.getElementById("bookContent").innerHTML = html;
}

function openBook(num){
  curBook = num;
  const b = BOOKS.find(x=>x.num===num);
  document.getElementById("bookView").style.display="none";
  document.getElementById("tabsEl").style.display="none";
  document.getElementById("chview").style.display="block";
  document.getElementById("backBtn").classList.remove("hidden");
  document.getElementById("hdrText").innerHTML=
    `<div class="ch-hdr-book">${b.n}</div>
     <div class="ch-hdr-sub">${b.ch}장 · <span id="chDoneLbl">${doneCh(num)}</span>장 완독</div>`;
  // wolLink is now a button, handled by openLibCur()
  renderChapters();
}

function renderChapters(){
  const b = BOOKS.find(x=>x.num===curBook);
  document.getElementById("chGrid").innerHTML =
    Array.from({length:b.ch},(_,i)=>
      `<div class="ch-item">
        <button class="ch-check${state[curBook][i]?' done':''}" onclick="toggleCh(${i})" title="읽음 표시">✓</button>
        <button class="ch-num" onclick="openLib(event,${parseInt(curBook)},${i+1})">${i+1}장</button>
      </div>`
    ).join("");
}

function toggleCh(i){
  state[curBook][i] = !state[curBook][i];
  saveState();
  const checks = document.querySelectorAll(".ch-check");
  checks[i].classList.toggle("done", state[curBook][i]);
  document.getElementById("chDoneLbl").textContent = doneCh(curBook);
  updateProgress();
}

function checkAll(){
  state[curBook] = state[curBook].map(()=>true);
  saveState(); renderChapters();
  document.getElementById("chDoneLbl").textContent = BOOKS.find(x=>x.num===curBook).ch;
  updateProgress();
}

function clearBook(){
  if(!confirm(BOOKS.find(x=>x.num===curBook).n+" 읽기 기록을 초기화할까요?")) return;
  state[curBook] = state[curBook].map(()=>false);
  saveState(); renderChapters();
  document.getElementById("chDoneLbl").textContent = "0";
  updateProgress();
}

function goBack(){
  curBook = null;
  document.getElementById("chview").style.display="none";
  document.getElementById("bookView").style.display="block";
  document.getElementById("tabsEl").style.display="flex";
  document.getElementById("backBtn").classList.add("hidden");
  document.getElementById("hdrText").innerHTML=
    `<div class="htitle">성경 읽기 체크리스트</div>
     <div class="hsub">66권 · 장별 완독 목표</div>`;
  renderBooks();
}

function resetAll(){
  if(!confirm("모든 읽기 기록을 초기화할까요?")) return;
  BOOKS.forEach(b=>{ state[b.num]=Array(b.ch).fill(false); });
  saveState();
  if(curBook){ renderChapters(); document.getElementById("chDoneLbl").textContent="0"; }
  else renderBooks();
  updateProgress();
}

// Open JW Library app only, prevent browser from opening
function openLib(e, book, chapter) {
  if(e) e.preventDefault();
  const url = 'https://www.jw.org/finder?wtlocale=KO&prefer=app&bible-book=' + book + '&bible-chapter=' + chapter;
  // Use iframe trick to trigger app without opening browser
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = url;
  document.body.appendChild(iframe);
  setTimeout(() => document.body.removeChild(iframe), 2000);
}

function openLibCur() {
